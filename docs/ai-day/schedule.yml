- time: "13:00"
  type: "talk"
  title: "Evolving Methods for Scalable Content Generation with AI"
  duration: "20 min"
  abstract: >
    Content generation is evolving rapidly from section by section mapping where 
    authors must still manually define templated and structured content toward AI 
    systems that read the full body of project evidence, builds a unified understanding 
    of the work, and writes every section of content from that shared foundation. Key 
    recent advances in memory systems, context structure and compaction now enable this 
    evolving paradigm, The core insight is that most quality problems in technical 
    artifacts - terminology drift, redundancy, incomplete context - are symptoms of 
    context switching. An agentic pipeline that eliminates context switching eliminates 
    the symptoms of drift and lack of coherence across the body of the content being 
    generated. Layered quality passes, combining fast deterministic checks with 
    LLM-driven semantic review enable large scale pressure testing for generated content. 
    The resulting artifacts and documents are structurally complete, compliant, and 
    internally consistent and represent a new, evolving paradigm in content generation 
    for clinical and medical information.
  speakers:
    - name: "Jeremy Zhang"
      affiliation: "Otsuka Pharmaceutical Companies"
      bio: >
        Jeremy Zhang, PhD is Senior Director, Data Science Solutions at Otsuka 
        Pharmaceutical Companies, focusing on extracting insights from data, 
        building predictive models, and enabling data-driven decision-making and 
        the development and application of advanced analytical methods including AI. 
        Jeremy has over 15 years of experience in life science research, development, 
        manufacturing, quality, and product launch. Prior to joining Otsuka, he has 
        held data science leadership positions of increasing responsibility at Gilead 
        Sciences and Abbott Labs. Jeremy holds a Bachelor’s degree in biomedical 
        engineering from Duke University and a PhD in bioengineering from Clemson 
        University.

- time: "13:20"
  type: "talk"
  title: "Hands Dirty First: Practical Notes from Before, During, and After Building Agentic Workflows"
  duration: "20 min"
  abstract: >
    2026 has been a banner year for AI and has pushed LLM capabilities across a new 
    operational threshold that makes it practical for agents to execute structured 
    workflows through explicit orchestration frameworks such as Claude Code, with 
    task-specific guidance encoded in lightweight markdown artifacts such as skill 
    files. In a biostatistical and clinical data context, this can facilitate tasks 
    such as authoring statistical documentation and programming code, which in turn 
    produce analysis datasets and outputs. In practice, however, building such workflows 
    reliably raises substantial concerns around accuracy, evaluation, domain knowledge, 
    GxP validation, data privacy, and human accountability. This presentation shares 
    practical experience and reflections from building agentic workflows, organized in 
    three parts: early exploration, observations after diving in, and considerations 
    for those preparing to do the same. Examples will be presented to illustrate the 
    ideas.
  speakers:
    - name: "Peng Zhang"
      affiliation: "CIMS Global"
      bio: >
        Peng Zhang is the Associate Director of Innovative Data Sciences Department 
        at CIMS Global. He graduated from Rutgers School of Public Health with Ph.D. in 
        Biostatistics with research interest in adaptive design and statistical monitoring 
        of clinical trials.  
        Peng leads the internal development of R packages, R Shiny apps, agentic 
        workflow, and supports software & platform development with open-source solutions. 
        Peng has also served as independent statistician for 30+ DSMB meetings and 10+ 
        ongoing clinical trials from phase 2 to phase 3 for different therapeutic areas.

- time: "13:40"
  type: "talk"
  title: "'Ignore All Previous Instructions' and Other Things Your LLM Shouldn't Do in Pharma: Applying GenAI Security Guardrails in R"
  duration: "20 min"
  abstract: >
    As R users in pharma begin integrating LLMs into analytical and reporting workflows, 
    a practical question keeps coming up: how do we check what goes into the model and 
    what comes back, in a way that is transparent, auditable, and fits into how we already 
    work in R? 

    This talk presents {llmshieldr}, an open-source R package I've been developing as 
    an attempt to fill that gap. It adds a transparent, model-agnostic guardrail layer 
    that scans prompts, retrieved context, and model outputs before anything risky 
    leaves or enters your workflow. The rule engine supports regex pattern matching, 
    lightweight NLP intent detection, and optional semantic review using local LLMs, 
    keeping sensitive data off third-party APIs entirely. Controls are mapped to the 
    OWASP Top 10 for LLM Applications (2025), and every scan produces auditable findings 
    with configurable policies and structured logging. 

    I'll walk through the design with real examples, highlighting pharma-relevant 
    scenarios. This is an experimental project, being built for open source. The goal is 
    to share what's working, what's not, and start a conversation about what secure LLM 
    usage in R focussed pharma teams should actually look like.
  speakers:
    - name: "Indraneel Chakraborty"
      affiliation: "Independent Contributor"
      bio: >
        Indraneel is a Bioinformatician turned techie working at the intersection of 
        large language models and regulated cloud environments. With a background 
        spanning academic research and the biomedical data industry, he specializes 
        in bridging R and Python ecosystems to transform complex, domain-specific 
        problems into usable, maintainable solutions. As an active open-source advocate, 
        he contributes to projects across both R and Python, reviews technical 
        publications, and develops and maintains packages on CRAN. His R package 
        {clintrialx} with over 4.5k downloads has been recently cited in a Cambridge 
        University Press journal, reflecting its growing adoption within the research 
        community. His professional interests lie at the confluence of DevSecOps 
        practices for regulated industries, AI assisted reproducible data pipelines, 
        and democratizing safety tooling for the broader R community.

- time: "14:00"
  type: "talk"
  title: "Accelerating Population PK/PD Modeling and Simulation with GenAI"
  duration: "20 min"
  abstract: >
    Generative AI is rapidly moving from novelty to utility in quantitative drug 
    development. In this talk, I will present a live demo of how genAI can be applied 
    to population PK modeling and simulation workflows in R, from data review and model 
    coding to simulation, interpretation, and reporting. The session will highlight 
    practical use cases where genAI can improve speed and consistency while keeping 
    the pharmacometrician firmly in the loop. Attendees will leave with a grounded view 
    of how genAI can be used today to augment pharmacometrics workflows in a reproducible 
    and scientifically credible way.
  speakers:
    - name: "Husain Attarwala"
      affiliation: "Aera Therapeutics"
      bio: >
        Husain Attarwala is a quantitative clinical pharmacology and pharmacometrics 
        leader specializing in nucleic acid therapeutics, translational PK/PD, and 
        model-informed drug development. He is Vice President of Bioanalytics, DMPK, 
        Clinical Pharmacology and Analytics at Aera Therapeutics, where he works across 
        delivery-enabled genetic medicines and helps drive strategy across bioanalytics, 
        translational science, and clinical pharmacology. In addition to his scientific 
        leadership, he has developed genAI workflows for a range of use cases, including 
        regulatory report writing, competitive intelligence, and automation of 
        pharmacometrics and data analysis workflows. His career spans Alnylam, Moderna, 
        and Aera. At Alnylam, he contributed to programs associated with six approved 
        drugs. At Moderna, he supported development efforts during the COVID-19 vaccine 
        era while working across mRNA therapeutics and translational development. Across 
        his career, he has worked at the intersection of quantitative science, platform 
        innovation, and practical decision-making in drug development.

