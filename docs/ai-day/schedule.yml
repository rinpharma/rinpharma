- time: "15:00"
  type: "talk"
  title: "Harnessing Generative AI to Improve Test Data Quality and Efficiency in Clinical Trial Set-Up"
  duration: "20 min"
  abstract: >
    Generating and entering test data into electronic data capture (EDC) systems is a 
    critical yet laborious task, essential for validating study designs and numerous 
    downstream systems and programs. We previously leveraged open-source technology to 
    develop a tool to significantly ease the time-intensive effort of manual test data 
    entry and notable efficiency gains have been achieved since its release; however, it 
    falls short in effectively covering the full spectrum of test cases necessary for 
    clinical system set-up and programming. To overcome these challenges, Takeda has 
    sought to build on this innovative software solution to harness the power of 
    generative AI (GenAI) to expand the range of covered testing scenarios. During the 
    development process, strategies and best practices for maximizing GenAI potential 
    in the clinical test data context have been established, along with valuable lessons 
    learned along the way. Exciting potential future directions have been identified to 
    further reduce clinical trial system set-up times.
  speakers:
    - name: "Rita Pecuch"
      affiliation: "Takeda"
      bio: >
        Rita Pecuch is a Senior Data Engineer at Takeda with deep expertise at the 
        intersection of technology and the pharmaceutical industry, currently supporting 
        innovation and data enablement for clinical data management. She leads the design 
        and delivery of scalable automation capabilities and processes. In parallel, she 
        strengthens clinical programming foundations through modern software engineering 
        practices, robust controls, and fit-for-purpose generative AI implementations. 
        Rita brings hands-on experience navigating regulated environments and translating 
        complex clinical trial requirements into reliable, auditable solutions that improve 
        quality and accelerate trial execution. She is passionate about advancing clinical 
        trial technology and processes to help bring new treatment options to patients faster. 
    - name: "Varun Jagadeesh"
      affiliation: "Takeda"
      bio: >
        Varun Jagadeesh is a Principal Data Engineer with a strong background in building 
        scalable data platforms for clinical research. He leads the design of end-to-end 
        data pipelines that integrate, transform, and standardize data from diverse 
        systems — including APIs, EDC platforms, and cloud data warehouses — to enable 
        real-time analytics and strategic decision-making. His automation frameworks have 
        dramatically reduced manual processing times, cutting workflows that once took 
        weeks down to hours, and his tools empower non-technical stakeholders with direct 
        access to insights. He also drives innovation through AI-powered solutions, 
        including generative AI applications that enhance clinical workflows. 

- time: "15:20"
  type: "talk"
  title: "Scheduled Clinical Insights: AI-Assisted Quarto Reporting for Oncology Studies"
  duration: "20 min"
  abstract: >
    In a previous effort, we developed a hybrid R Shiny application combining 
    deterministic clinical visualizations with LLM-assisted exploration for early-phase 
    oncology data review. This talk presents an alternative delivery mode we're 
    exploring — an interactive, automated Quarto report generated and delivered daily 
    to end users. The workflow, orchestrated through Posit Connect, queries updated 
    study data, produces an abridged set of key outputs, applies LLM-assisted interpretation 
    to static visualizations, and incorporates a lightweight RAG pipeline (via ragnar) to 
    ground AI-generated insights in study context. We'll share the setup and practical 
    lessons from this early-stage effort. The Shiny app remains primary, but this explores 
    a scheduled, push-based complement for users whose needs are better met by a delivered 
    report than an open-ended tool.
  speakers:
    - name: "Matthew Kumar"
      affiliation: "Bayer"
      bio: >
        Matthew Kumar is a Lead Computational Scientist in Bayer's Applied Machine 
        Learning group, based in Mississauga, Ontario, Canada. He has over 10 years of 
        experience as a data scientist and statistician across epidemiology, regulatory 
        affairs, academia, and pharmaceuticals. He has co-authored peer-reviewed journal 
        articles, developed R and other statistical software packages, and consulted with 
        health agencies on statistical analysis and reporting. Matthew holds an M.Sc. in 
        Biostatistics from the University of Toronto and a Specialized Honours B.A. in 
        Behavioural Sciences from York University. 

