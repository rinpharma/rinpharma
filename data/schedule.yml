- time: "11:00 EDT"
  type: "talk"
  title: "Using LLMs to generate Teal applications: from proof of concept to production"
  duration: "20 min"
  track: us_europe
  abstract: >
    Large language models (LLMs) can accelerate code generation, making it easier to build 
    proof-of-concept tools and solutions. For example, building R Shiny applications using 
    the Teal framework for clinical data visualisation.  
    However, moving from AI experts building proof-of-concept applications to 
    Statistical Programmers using these tools to build production applications introduces 
    significant challenges. Applications are often highly customised and complex, and their 
    development requires a detailed understanding of specific clinical data, the programming 
    environment, and the company’s wider processes. Developers may also be new to 
    AI-assisted coding and the Teal framework.  
    In this presentation, we will discuss these challenges and share how 
    Johnson & Johnson is addressing them to scale adoption of Teal applications and 
    AI-assisted programming, enabling statistical programmers to harness LLMs 
    effectively in their day-to-day work.
  speakers:
    - name: "Nikolas Burkoff"
      affiliation: "Johnson & Johnson"
      bio: >
        Nik is a scientific software developer with over a decade of experience solving 
        technical challenges throughout the drug discovery life cycle. He has a strong 
        focus on R, algorithm development, and industrialising tools for statisticians and 
        scientists. He was a member of the core teal development team in its early years and 
        is excited to see its continued growth and adoption. He is energised by the 
        opportunities Gen AI brings and mindful of the challenges of its use in such a highly 
        regulated environment.

