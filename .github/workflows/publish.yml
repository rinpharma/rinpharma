name: Quarto Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      discussions: read

    steps:

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libarchive-dev

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.3"

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/R
            ~/.cache/R
          key: r-packages-${{ runner.os }}-${{ hashFiles('**/DESCRIPTION') }}
          restore-keys: |
            r-packages-${{ runner.os }}-

      - name: Install R packages
        run: |
          Rscript -e '
            install.packages(
              c(
                "shiny",
                "dplyr",
                "purrr",
                "bslib",
                "bsicons",
                "shinylive",
                "rmarkdown",
                "knitr",
                "jsonlite",
                "here"
              ),
              repos = "https://cloud.r-project.org"
            )
          '

      - name: Cache Shinylive assets
        uses: actions/cache@v4
        with:
          path: ~/.cache/shinylive
          key: shinylive-${{ runner.os }}-0.9.1

      - name: Ensure Shinylive assets
        run: |
          Rscript -e 'shinylive::assets_ensure()'

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
