name: Quarto Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      discussions: read

    steps:

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libarchive-dev

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.3"

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: /home/runner/work/_temp/Library
          key: r-packages-${{ runner.os }}-r453

      - name: Cache R packages 
        id: cache-r 
        uses: actions/cache@v4 
        with: 
          path: /home/runner/work/_temp/Library
          key: r-packages-${{ runner.os }}-r453-v1
          restore-keys: | 
            r-packages-${{ runner.os }}-

      - name: Install R packages
        if: steps.cache-r.outputs.cache-hit != 'true'
        run: |
          Rscript -e '
            install.packages(
              c(
                "shiny",
                "dplyr",
                "purrr",
                "bslib",
                "bsicons",
                "shinylive",
                "rmarkdown",
                "knitr",
                "jsonlite",
                "here"
              ),
              repos = sprintf("https://packagemanager.posit.co/cran/2025-10-08/bin/linux/noble-%s/%s", R.version["arch"], substr(getRversion(), 1, 3))
            )
          '
      - name: Cache Shinylive assets
        uses: actions/cache@v4
        with:
          path: ~/.cache/shinylive
          key: shinylive-${{ runner.os }}-0.9.1

      - name: Ensure Shinylive assets
        run: |
          Rscript -e 'shinylive::assets_ensure()'

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
